name: DataDash QA Playwright

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  run-playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install
          npx playwright install --with-deps

      - name: Run Playwright scrape - 23f3000786@ds.study.iitm.ac.in
        env:
          # set BASE_URL as a repository secret before running the workflow
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          node scripts/scrape.js

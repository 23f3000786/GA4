name: Daily Repository Update

on:
  schedule:
    - cron: '17 4 * * *'   # Runs daily at 04:17 UTC (choose any fixed time)
  workflow_dispatch:       # Allows manual trigger

jobs:
  update-repo:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: 23f3000786@ds.study.iitm.ac.in - Daily Commit Step
        run: |
          echo "Last updated on $(date -u)" >> daily_update.log
          
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          
          git add daily_update.log
          git commit -m "Automated daily update - $(date -u)" || echo "No changes to commit"
          git push
